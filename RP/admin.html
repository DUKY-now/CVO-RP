<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CONSOLE CVO</title>
<link rel="icon" type="image/png" href="/assets/logo/Fav_Icon.png">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/pages/admin.css">
</head>

<body style="background:#000; color:#d4af37; font-family:Inter;">

<!-- LOGIN -->
<div id="login-box">
    <h1>ACCÈS RESTREINT</h1>
    <input type="password" id="pwd" placeholder="Mot de passe">
    <button onclick="login()">Entrer</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;" class="admin-panel">

    <h1 class="admin-title">CONSOLE CVO</h1>

    <div class="admin-grid">

        <!-- TRAME -->
        <div class="admin-card">
            <h2>📍 Trame active</h2>
            <select id="trameSelect"></select>
        </div>

        <!-- GLOBAL -->
        <div class="admin-card">
            <h2>📊 Progression globale</h2>

            <input type="range" id="globalInput" min="0" max="100">
            <input type="number" id="globalRange" min="0" max="100">

            <div class="admin-value">
                <span>Valeur :</span>
                <strong id="globalPreview">0%</strong>
            </div>
        </div>

        <!-- PHASE -->
        <div class="admin-card">
            <h2>🎯 Phase actuelle</h2>

            <select id="phase">
                <option value="1">Phase 1</option>
                <option value="2">Phase 2</option>
                <option value="3">Phase 3</option>
                <option value="4">Phase 4</option>
                <option value="5">Phase 5</option>
            </select>

            <br><br>

            <label>Progression phase</label>

            <input type="range" id="phaseInput" min="0" max="100">
            <input type="number" id="phaseRange" min="0" max="100">

            <div class="admin-value">
                <span>Valeur :</span>
                <strong id="phasePreview">0%</strong>
            </div>
        </div>

        <!-- VISIBILITÉ -->
        <div class="admin-card full">
            <h2>👁 Visibilité des phases</h2>

            <div class="check-grid">
                <label><input type="checkbox" id="show1"> Phase 1</label>
                <label><input type="checkbox" id="show2"> Phase 2</label>
                <label><input type="checkbox" id="show3"> Phase 3</label>
                <label><input type="checkbox" id="show4"> Phase 4</label>
                <label><input type="checkbox" id="show5"> Phase 5</label>
            </div>
        </div>

        <!-- ACTIONS -->
        <div class="admin-card full center">
            <button onclick="save()" class="btn-admin">💾 Sauvegarder</button>

            <div class="admin-links">
                <a href="/pages/trames.html">Voir Trames</a>
                <a href="/index.html">Accueil</a>
                <a href="/pages/Phase_Staff.html">Scénario</a>
            </div>
        </div>

    </div>
</div>

<script>
const API = "https://cvo-trames-api.dukynow.workers.dev/api/trames";

/* ================= LOGIN ================= */

const ADMIN_PASSWORD = "admin";

function login() {
    const input = document.getElementById("pwd").value;

    if (input !== ADMIN_PASSWORD) {
        document.getElementById("error").innerText = "Accès refusé";
        return;
    }

    document.getElementById("login-box").style.display = "none";
    document.getElementById("panel").style.display = "block";
    loadState();
}

/* ================= FETCH ================= */

async function getAllTrames() {
    const res = await fetch(API + "?t=" + Date.now());
    return await res.json();
}

/* ================= SELECTOR ================= */

function initSelector(all, current) {
    const sel = document.getElementById("trameSelect");
    sel.innerHTML = "";

    Object.keys(all || {}).forEach(key => {
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = key;
        sel.appendChild(opt);
    });

    sel.value = current;

    sel.onchange = () => {
        localStorage.setItem("active_trame", sel.value);
        loadState();
    };
}

/* ================= LOAD ================= */

async function loadState() {

    const current = localStorage.getItem("active_trame") || "trame1";
    const all = await getAllTrames();

    initSelector(all, current);

    const state = all?.[current];

    if (!state) return;

    document.getElementById("phase").value = state.phase ?? 1;

    document.getElementById("globalInput").value = state.progression ?? 0;
    document.getElementById("globalRange").value = state.progression ?? 0;

    document.getElementById("phaseInput").value = state.phaseProgress ?? 0;
    document.getElementById("phaseRange").value = state.phaseProgress ?? 0;

    for (let i = 1; i <= 5; i++) {
        const el = document.getElementById("show" + i);
        if (el) el.checked = state.visiblePhases?.[i] ?? false;
    }
}

/* ================= SAVE ================= */

async function save() {

    const current = document.getElementById("trameSelect").value;
    const all = await getAllTrames();

    all[current] = {
        phase: Number(document.getElementById("phase").value),
        progression: Number(document.getElementById("globalInput").value),
        phaseProgress: Number(document.getElementById("phaseInput").value),
        visiblePhases: {
            1: document.getElementById("show1").checked,
            2: document.getElementById("show2").checked,
            3: document.getElementById("show3").checked,
            4: document.getElementById("show4").checked,
            5: document.getElementById("show5").checked
        }
    };

    await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(all)
    });

    localStorage.setItem("active_trame", current);
    window.dispatchEvent(new Event("storage"));

    alert("Sauvegardé");
}

/* ================= SLIDERS ================= */

const g1 = document.getElementById("globalInput");
const g2 = document.getElementById("globalRange");
const globalPreview = document.getElementById("globalPreview");

g1.oninput = () => {
    g2.value = g1.value;
    globalPreview.textContent = g1.value + "%";
};

g2.oninput = () => {
    g1.value = g2.value;
    globalPreview.textContent = g2.value + "%";
};

const p1 = document.getElementById("phaseInput");
const p2 = document.getElementById("phaseRange");
const phasePreview = document.getElementById("phasePreview");

p1.oninput = () => {
    p2.value = p1.value;
    phasePreview.textContent = p1.value + "%";
};

p2.oninput = () => {
    p1.value = p2.value;
    phasePreview.textContent = p2.value + "%";
};

/* ================= START ================= */

document.addEventListener("DOMContentLoaded", loadState);
</script>

</body>
</html>
