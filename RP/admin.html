<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CONSOLE CVO</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/pages/admin.css">
</head>

<body style="background:#000; color:#d4af37; font-family:Inter;">

<!-- LOGIN -->
<div id="login-box">
    <h1>ACCÈS RESTREINT</h1>
    <input type="password" id="pwd" placeholder="Mot de passe">
    <button onclick="login()">Entrer</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;" class="admin-panel">

    <h1 class="admin-title">CONSOLE CVO</h1>

    <div class="admin-grid">

        <!-- CREATE TRAME -->
        <div class="admin-card">
            <h2>➕ Trames</h2>
            <input id="newTrameName" placeholder="Nom trame">
            <button onclick="createTrame()">Créer</button>
            <button onclick="deleteTrame()" class="danger">🗑 Supprimer</button>
        </div>

        <!-- TRAME SELECT -->
        <div class="admin-card">
            <h2>📍 Trame active</h2>
            <select id="trameSelect"></select>
        </div>

        <!-- GLOBAL -->
        <div class="admin-card">
            <h2>📊 Progression globale</h2>
            <input type="range" id="globalInput" min="0" max="100">
            <input type="number" id="globalRange" min="0" max="100">
            <div><strong id="globalPreview">0%</strong></div>
        </div>

        <!-- PHASE -->
        <div class="admin-card">
            <h2>🎯 Phase active</h2>

            <select id="phase"></select>

            <h3>Progression phase</h3>
            <input type="range" id="phaseInput" min="0" max="100">
            <input type="number" id="phaseRange" min="0" max="100">

            <div><strong id="phasePreview">0%</strong></div>

            <button onclick="addPhase()">➕ Ajouter phase</button>
        </div>

        <!-- PHASE LIST -->
        <div class="admin-card full">
            <h2>👁 Phases</h2>
            <div id="phaseList"></div>
        </div>

        <!-- SAVE -->
        <div class="admin-card full center">
            <button onclick="save()">💾 Sauvegarder</button>
        </div>

    </div>
</div>

<script>

const API = "https://cvo-trames-api.dukynow.workers.dev/api/trames";

/* ================= LOGIN ================= */
function login() {
    const input = document.getElementById("pwd").value;

    if (input !== "admin") {
        document.getElementById("error").innerText = "Accès refusé";
        return;
    }

    document.getElementById("login-box").style.display = "none";
    document.getElementById("panel").style.display = "block";
    loadState();
}

/* ================= FETCH ================= */
async function getAll() {
    return await (await fetch(API)).json();
}

/* ================= SELECTOR ================= */
function initSelector(all, current) {
    const sel = document.getElementById("trameSelect");
    sel.innerHTML = "";

    Object.keys(all).forEach(k => {
        const opt = document.createElement("option");
        opt.value = k;
        opt.textContent = all[k].nom || k;
        sel.appendChild(opt);
    });

    sel.value = current;

    sel.onchange = () => {
        localStorage.setItem("active_trame", sel.value);
        loadState();
    };
}

/* ================= LOAD ================= */
async function loadState() {

    const all = await getAll();
    const current = localStorage.getItem("active_trame")
        || Object.keys(all)[0];

    if (!all[current]) return;

    initSelector(all, current);

    const state = all[current];

    document.getElementById("phase").innerHTML = "";

    state.phases.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = p.nom || ("Phase " + p.id);
        document.getElementById("phase").appendChild(opt);
    });

    document.getElementById("phase").value = state.phase;

    globalInput.value = state.progression;
    globalRange.value = state.progression;
    globalPreview.textContent = state.progression + "%";

    const active = state.phases.find(p => p.id == state.phase);

    phaseInput.value = active?.progress || 0;
    phaseRange.value = active?.progress || 0;
    phasePreview.textContent = (active?.progress || 0) + "%";

    renderPhaseList(state);
}

/* ================= CREATE TRAME ================= */
async function createTrame() {

    const name = document.getElementById("newTrameName").value.trim();
    if (!name) return;

    const all = await getAll();
    const key = name.toLowerCase().replace(/\s+/g, "_");

    if (all[key]) return alert("Existe déjà");

    all[key] = {
        nom: name,
        progression: 0,
        phase: 1,
        phases: [
            { id: 1, nom: "Phase 1", visible: true, progress: 0 }
        ]
    };

    await fetch(API, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(all)
    });

    loadState();
}

/* ================= DELETE TRAME ================= */
async function deleteTrame() {

    const current = document.getElementById("trameSelect").value;

    const all = await getAll();

    if (!all[current]) return;

    if (!confirm("Supprimer " + current + " ?")) return;

    delete all[current];

    await fetch(API, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(all)
    });

    const keys = Object.keys(all);
    if (keys.length) {
        localStorage.setItem("active_trame", keys[0]);
    }

    loadState();
}

/* ================= ADD PHASE ================= */
async function addPhase() {

    const all = await getAll();
    const current = document.getElementById("trameSelect").value;

    const state = all[current];

    const newId = state.phases.length + 1;

    state.phases.push({
        id: newId,
        nom: "Phase " + newId,
        visible: true,
        progress: 0
    });

    await fetch(API, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(all)
    });

    loadState();
}

/* ================= PHASE LIST ================= */
function renderPhaseList(state) {

    const c = document.getElementById("phaseList");
    c.innerHTML = "";

    state.phases.forEach(p => {

        const div = document.createElement("div");

        div.innerHTML = `
            <input value="${p.nom}" onchange="updatePhaseName(${p.id}, this.value)">
            <input type="checkbox" ${p.visible ? "checked":""}
                onchange="togglePhase(${p.id}, this.checked)">
            <button onclick="deletePhase(${p.id})">🗑</button>
        `;

        c.appendChild(div);
    });
}

/* ================= PHASE EDIT ================= */
function updatePhaseName(id, value) {
    getAll().then(all => {
        const current = trameSelect.value;
        const state = all[current];

        const p = state.phases.find(x => x.id === id);
        if (p) p.nom = value;

        saveAll(all);
    });
}

function togglePhase(id, val) {
    getAll().then(all => {
        const state = all[trameSelect.value];

        const p = state.phases.find(x => x.id === id);
        if (p) p.visible = val;

        saveAll(all);
    });
}

async function deletePhase(id) {

    const all = await getAll();
    const state = all[trameSelect.value];

    state.phases = state.phases.filter(p => p.id !== id);

    await saveAll(all);
    loadState();
}

/* ================= SAVE ================= */
async function save() {

    const all = await getAll();
    const current = trameSelect.value;

    const state = all[current];

    state.progression = +globalInput.value;
    state.phase = +phase.value;

    const active = state.phases.find(p => p.id == state.phase);
    if (active) active.progress = +phaseInput.value;

    await saveAll(all);

    alert("Sauvegardé");
}

async function saveAll(data) {
    await fetch(API, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
    });
}

/* ================= SLIDERS ================= */
globalInput.oninput = e => {
    globalRange.value = e.target.value;
    globalPreview.textContent = e.target.value + "%";
};

globalRange.oninput = e => {
    globalInput.value = e.target.value;
    globalPreview.textContent = e.target.value + "%";
};

phaseInput.oninput = e => {
    phaseRange.value = e.target.value;
    phasePreview.textContent = e.target.value + "%";
};

phaseRange.oninput = e => {
    phaseInput.value = e.target.value;
    phasePreview.textContent = e.target.value + "%";
};

/* ================= START ================= */
document.addEventListener("DOMContentLoaded", loadState);

</script>

</body>
</html>
