<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Missions RP</title>

<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/pages/adminmission.css">
<link rel="icon" type="image/png" href="/assets/logo/Fav_Icon.png">
</head>

<body>

<h1>🛠 ADMIN MISSIONS RP</h1>

<!-- ================= CONTEXTE RP ================= -->
<div class="card">

    <h2>📍 Contexte RP (Trame / Phase)</h2>

    <!-- TRAME ACTIVE -->
    <label>Trame</label>
    <select id="trameSelect"></select>

    <!-- PHASE ACTIVE -->
    <label>Phase</label>
    <select id="phaseSelect"></select>

</div>

<!-- ================= CREATION MISSION ================= -->
<div class="card">

    <h2>➕ Créer une mission</h2>

    <input id="missionName" placeholder="Nom mission">
    <button onclick="createMission()">Créer mission</button>

</div>

<hr>

<!-- ================= SELECTION MISSION ================= -->
<div class="card">

    <h2>✏️ Mission active</h2>

    <select id="missionSelect"></select>

</div>

<!-- ================= EDIT MISSION ================= -->
<div class="card">

    <h3>📝 Contenu mission</h3>

    <input id="title" placeholder="Titre">
    <textarea id="content" placeholder="Contenu mission"></textarea>

    <input id="codeUnlock" placeholder="Code RP (optionnel)">
    <input id="unlockTime" type="datetime-local">

<button onclick="addNote()">➕ Ajouter note</button>
</div>

<!-- ================= MEDIAS ================= -->
<div class="card">

    <h3>🖼 Médias (images / fichiers RP)</h3>

    <input id="mediaUrl" placeholder="URL image ou fichier">

    <select id="mediaType">
        <option value="image">Image</option>
        <option value="file">Fichier</option>
    </select>

    <button onclick="addMedia()">Ajouter média</button>

</div>

<!-- ================= PREUVES ================= -->
<div class="card">

    <h3>📂 Preuves RP</h3>

    <input id="proofTitle" placeholder="Titre preuve">
    <input id="proofDesc" placeholder="Description">
    <input id="proofImg" placeholder="Image URL">

    <button onclick="addProof()">Ajouter preuve</button>

</div>

<hr>

<!-- ================= NOTES / VISUALISATION ================= -->
<div class="card">

    <h2>📜 Notes de mission (preview admin)</h2>

    <!-- IMPORTANT : affichage dynamique -->
    <div id="notesList"></div>

</div>

<hr>

<a href="/RP/admin.html">⬅ Retour admin principal</a>

<script src="/assets/js/admin-missions.js"></script>

</body>
</html>
