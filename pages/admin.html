<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CONSOLE CVO</title>
<link rel="icon" type="image/png" href="/assets/logo/Fav_Icon.png">
<link rel="stylesheet" href="/css/style.css">
</head>

<body style="background:#000; color:#d4af37; font-family:Inter;">

<!-- LOGIN -->
<div id="login-box">
    <h1>ACCÈS RESTREINT</h1>
    <input type="password" id="pwd" placeholder="Mot de passe">
    <button onclick="login()">Entrer</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">

<h1>CONSOLE CVO</h1>

<label>Progression globale</label>
<input type="range" id="globalInput" min="0" max="100">
<input type="number" id="globalRange" min="0" max="100">

<br><br>

<label>Phase actuelle</label>
<select id="phase">
    <option value="1">Phase 1</option>
    <option value="2">Phase 2</option>
    <option value="3">Phase 3</option>
    <option value="4">Phase 4</option>
    <option value="5">Phase 5</option>
</select>

<br><br>

<label>Progression phase</label>
<input type="range" id="phaseInput" min="0" max="100">
<input type="number" id="phaseRange" min="0" max="100">

<br><br>

<button onclick="save()">Sauvegarder</button>

<a href="/pages/trames.html">Trames</a>
<a href="/index.html">Accueil</a>

<p>Passer à la description du scénario</p>
<a href="/pages/Phase_Staff.html">Scenar</a>
</div>

<script>
const ADMIN_PASSWORD = "admin";

function login() {
    const input = document.getElementById("pwd").value;

    if (input === ADMIN_PASSWORD) {
        document.getElementById("login-box").style.display = "none";
        document.getElementById("panel").style.display = "block";
        loadState();
    } else {
        document.getElementById("error").innerText = "Accès refusé";
    }
}

// sync sliders
const g1 = document.getElementById("globalInput");
const g2 = document.getElementById("globalRange");

g1.oninput = () => g2.value = g1.value;
g2.oninput = () => g1.value = g2.value;

const p1 = document.getElementById("phaseInput");
const p2 = document.getElementById("phaseRange");

p1.oninput = () => p2.value = p1.value;
p2.oninput = () => p1.value = p2.value;

function loadState() {
    const state = JSON.parse(localStorage.getItem("cvo_state")) || {
        phase: 1,
        progression: 0,
        phaseProgress: 0
    };

    document.getElementById("phase").value = state.phase;

    document.getElementById("globalInput").value = state.progression;
    document.getElementById("globalRange").value = state.progression;

    document.getElementById("phaseInput").value = state.phaseProgress;
    document.getElementById("phaseRange").value = state.phaseProgress;
}

function save() {
    const state = {
        phase: Number(document.getElementById("phase").value),
        progression: Number(document.getElementById("globalInput").value),
        phaseProgress: Number(document.getElementById("phaseInput").value)
    };

    localStorage.setItem("cvo_state", JSON.stringify(state));

    window.dispatchEvent(new Event("storage"));

    alert("Sauvegardé");
}
</script>

</body>
</html>
